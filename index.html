<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="canonical" href="https://mavenmasters.github.io">
    <title>Maven Masters</title>
</head>
<body>
    <h1>Welcome to Maven Masters</h1>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script>
        // Initialize Chart.js and other JavaScript functionalities
        const ctx = document.getElementById('myChart').getContext('2d');
        const myChart = new Chart(ctx, {
            type: 'bar',
            data: {
                labels: ['Red', 'Blue', 'Yellow', 'Green', 'Purple', 'Orange'],
                datasets: [{
                    label: '# of Votes',
                    data: [12, 19, 3, 5, 2, 3],
                    backgroundColor: [
                        'rgba(255, 99, 132, 0.2)',
                        'rgba(54, 162, 235, 0.2)',
                        'rgba(255, 206, 86, 0.2)',
                        'rgba(75, 192, 192, 0.2)',
                        'rgba(153, 102, 255, 0.2)',
                        'rgba(255, 159, 64, 0.2)'
                    ],
                    borderColor: [
                        'rgba(255, 99, 132, 1)',
                        'rgba(54, 162, 235, 1)',
                        'rgba(255, 206, 86, 1)',
                        'rgba(75, 192, 192, 1)',
                        'rgba(153, 102, 255, 1)',
                        'rgba(255, 159, 64, 1)'
                    ],
                    borderWidth: 1
                }]
            },
            options: {
                scales: {
                    y: {
                        beginAtZero: true
                    }
                }
            }
        });

        // Admin authentication with password
        function authenticateAdmin(password) {
            if (password === 'your_password_here') {
                // Display admin modal
                document.getElementById('adminModal').style.display = 'block';
            } else {
                alert('Invalid password!');
            }
        }

        // Improved chart instance handling
        function updateChartData(newData) {
            myChart.data.datasets[0].data = newData;
            myChart.update();
        }
    </script>
    <div id="adminModal" style="display:none;">
        <h2>Admin Modal</h2>
        <button onclick="document.getElementById('adminModal').style.display='none'">Close</button>
    </div>
</body>
</html>
