<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maven Masters - Query Forms</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #e9f0f8 0%, #d9e2ec 100%);
            color: #333;
            padding: 2rem 1rem;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .container {
            max-width: 960px;
            width: 100%;
            margin: 0 auto;
            background: white;
            padding: 2.5rem 2rem;
            border-radius: 24px;
            box-shadow: 0 16px 40px rgba(0, 0, 0, 0.08);
            position: relative;
            overflow: hidden;
        }

        .logo-header {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1.2rem;
            margin-bottom: 0.6rem;
            flex-wrap: wrap;
            text-align: center;
        }

        .logo-header img {
            height: 70px;
            width: auto;
            filter: drop-shadow(0 4px 6px rgba(0,0,0,0.1));
            transition: transform 0.3s ease;
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-8px); }
            100% { transform: translateY(0px); }
        }

        h1 {
            font-size: 3.2rem;
            font-weight: 800;
            letter-spacing: 1px;
            background: linear-gradient(135deg, #1a3b5d 0%, #2b5f8a 70%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: 2px 2px 4px rgba(26,59,93,0.15);
            margin: 0;
            line-height: 1.2;
        }

        p.subtitle {
            text-align: center;
            color: #5c6b7a;
            font-size: 1.15rem;
            margin-bottom: 2rem;
            font-weight: 500;
        }

        .tabs {
            display: flex;
            flex-wrap: wrap;
            gap: 0.6rem;
            margin-bottom: 2.2rem;
            border-bottom: 2px solid #e0e6ed;
        }

        .tab-btn {
            flex: 1;
            padding: 0.9rem 0.4rem;
            border: none;
            background: transparent;
            cursor: pointer;
            font-size: 0.98rem;
            font-weight: 600;
            color: #5c6b7a;
            border-bottom: 3px solid transparent;
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
            white-space: nowrap;
        }

        .tab-btn::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 50%;
            width: 0;
            height: 3px;
            background: #1a3b5d;
            transition: all 0.3s ease;
            transform: translateX(-50%);
        }

        .tab-btn:hover {
            color: #1a3b5d;
            background: rgba(26,59,93,0.05);
            transform: translateY(-2px);
        }

        .tab-btn.active {
            color: #1a3b5d;
            border-bottom-color: #1a3b5d;
        }

        .tab-btn.active::after {
            width: 100%;
        }

        .tab-btn:active {
            transform: scale(0.96);
        }

        .form-section {
            display: none;
            animation: fade 0.3s ease;
        }

        .form-section.active {
            display: block;
        }

        @keyframes fade {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .form-group {
            margin-bottom: 1.2rem;
        }

        label {
            display: block;
            font-weight: 700;
            margin-bottom: 0.35rem;
            color: #1a3b5d;
            font-size: 0.95rem;
        }

        /* Red asterisk for mandatory fields */
        label .required-star {
            color: #e74c3c;
            margin-left: 2px;
            font-weight: bold;
        }

        input, select, textarea {
            width: 100%;
            padding: 0.85rem 1rem;
            border: 1px solid #ccd6e0;
            border-radius: 12px;
            font-size: 1rem;
            transition: all 0.2s ease;
            background: #fafbfc;
        }

        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: #1a3b5d;
            box-shadow: 0 0 0 4px rgba(26,59,93,0.08);
            background: white;
        }

        textarea {
            resize: vertical;
            min-height: 100px;
        }

        button[type="submit"] {
            width: 100%;
            padding: 1rem;
            background: linear-gradient(135deg, #1a3b5d 0%, #2b5f8a 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1.15rem;
            font-weight: 700;
            cursor: pointer;
            margin-top: 0.5rem;
            transition: all 0.3s ease;
            box-shadow: 0 6px 18px rgba(26,59,93,0.2);
            letter-spacing: 0.5px;
            position: relative;
            overflow: hidden;
        }

        button[type="submit"]:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 24px rgba(26,59,93,0.3);
            background: linear-gradient(135deg, #0f2e4a 0%, #1f4a6b 100%);
        }

        button[type="submit"]:active {
            transform: translateY(2px);
            box-shadow: 0 4px 10px rgba(26,59,93,0.2);
        }

        button[type="submit"]::after {
            content: '';
            position: absolute;
            left: 50%;
            top: 50%;
            width: 0;
            height: 0;
            background: rgba(255,255,255,0.3);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
        }

        button[type="submit"]:active::after {
            width: 300px;
            height: 300px;
        }

        .message {
            margin-top: 1.2rem;
            text-align: center;
            padding: 0.8rem;
            border-radius: 10px;
            display: none;
            font-weight: 500;
            animation: fade 0.3s ease;
        }

        .success {
            background: #d4edda;
            color: #155724;
        }
        .error {
            background: #f8d7da;
            color: #721c24;
        }

        hr {
            margin: 2.5rem 0 1.5rem;
            border: 0;
            height: 1px;
            background: #e0e6ed;
        }

        .instructions {
            background: #f0f5ff;
            padding: 1.2rem;
            border-radius: 12px;
            font-size: 0.92rem;
            margin-bottom: 0.5rem;
            color: #2c3e50;
            border-left: 4px solid #1a3b5d;
        }
        .instructions strong {
            color: #1a3b5d;
        }

        @media (max-width: 600px) {
            h1 {
                font-size: 2.4rem;
            }
            .logo-header img {
                height: 55px;
            }
            .tab-btn {
                font-size: 0.8rem;
                padding: 0.6rem 0.2rem;
            }
            .container {
                padding: 1.5rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <nav class="container">
      <a href="index.html" class="logo" id="secretAdminLogo" aria-label="Maven Masters Home">
        <img src="assets/images/logo.svg" alt="Maven Masters Logo" class="logo-img">
            <h1>Maven Masters</h1>
        </div>
        <p class="subtitle">Select a service to get started</p>

        <div class="tabs">
            <button class="tab-btn active" data-tab="academic">📚 Academic Writing</button>
            <button class="tab-btn" data-tab="study">🌍 Study Abroad</button>
            <button class="tab-btn" data-tab="careers">💼 Careers</button>
            <button class="tab-btn" data-tab="general">🏢 General Services</button>
        </div>

        <!-- Academic Writing Form -->
        <div class="form-section active" id="academic">
            <form id="academicForm" data-form-name="Academic Writing">
                <div class="form-group"><label>Full Name <span class="required-star">*</span></label><input type="text" name="fullName" required></div>
                <div class="form-group"><label>Email Address <span class="required-star">*</span></label><input type="email" name="email" required></div>
                <div class="form-group"><label>Phone Number <span class="required-star">*</span></label><input type="tel" name="phone" required></div>
                <div class="form-group"><label>Service Required</label>
                    <select name="service" required>
                        <option value="">--Select--</option>
                        <option>Thesis & Dissertation Writing</option>
                        <option>Paper & Journals Publication</option>
                        <option>Statistical & Analytical Services</option>
                    </select></div>
                <div class="form-group"><label>Academic Level</label>
                    <select name="academicLevel">
                        <option value="">--Select--</option>
                        <option>Undergraduate</option>
                        <option>Masters</option>
                        <option>PhD</option>
                    </select></div>
                <div class="form-group"><label>Subject/Discipline</label><input type="text" name="subject"></div>
                <div class="form-group"><label>Project Details</label><textarea name="projectDetails" placeholder="Describe your requirements, word count, deadline..."></textarea></div>
                <div class="form-group"><label>Plagiarism Report Required?</label>
                    <select name="plagiarism">
                        <option value="">--Select--</option>
                        <option>Yes</option>
                        <option>No</option>
                    </select></div>
                <div class="form-group"><label>How did you hear about us?</label><input type="text" name="reference"></div>
                <button type="submit">Submit Query</button>
            </form>
        </div>

        <!-- Study Abroad Form -->
        <div class="form-section" id="study">
            <form id="studyForm" data-form-name="Study Abroad">
                <div class="form-group"><label>Full Name <span class="required-star">*</span></label><input type="text" name="fullName" required></div>
                <div class="form-group"><label>Email Address <span class="required-star">*</span></label><input type="email" name="email" required></div>
                <div class="form-group"><label>Phone Number <span class="required-star">*</span></label><input type="tel" name="phone" required></div>
                <div class="form-group"><label>Service Required</label>
                    <select name="service" required>
                        <option value="">--Select--</option>
                        <option>University & Program Selection</option>
                        <option>SOP & Application</option>
                        <option>Scholarship Guidance</option>
                        <option>Test Prep - IELTS/GRE</option>
                    </select></div>
                <div class="form-group"><label>Preferred Country</label>
                    <select name="country">
                        <option value="">--Select--</option>
                        <option>USA</option>
                        <option>UK</option>
                        <option>Canada</option>
                        <option>Australia</option>
                        <option>Germany</option>
                        <option>New Zealand</option>
                        <option>Other</option>
                    </select></div>
                <div class="form-group"><label>Current Education Level</label><input type="text" name="education"></div>
                <div class="form-group"><label>Target Degree</label>
                    <select name="degree">
                        <option value="">--Select--</option>
                        <option>Bachelors</option>
                        <option>Masters</option>
                        <option>PhD</option>
                        <option>MBA</option>
                        <option>Other</option>
                    </select></div>
                <div class="form-group"><label>Test Scores (if any)</label><input type="text" name="testScores" placeholder="IELTS/GRE/GMAT etc."></div>
                <div class="form-group"><label>Preferred Intake</label>
                    <select name="intake">
                        <option value="">--Select--</option>
                        <option>Fall 2026</option>
                        <option>Spring 2027</option>
                        <option>Fall 2027</option>
                        <option>Other</option>
                    </select></div>
                <button type="submit">Submit Query</button>
            </form>
        </div>

        <!-- Careers Form -->
        <div class="form-section" id="careers">
            <form id="careersForm" data-form-name="Careers">
                <div class="form-group"><label>Full Name <span class="required-star">*</span></label><input type="text" name="fullName" required></div>
                <div class="form-group"><label>Email Address <span class="required-star">*</span></label><input type="email" name="email" required></div>
                <div class="form-group"><label>Phone Number <span class="required-star">*</span></label><input type="tel" name="phone" required></div>
                <div class="form-group"><label>Service Required</label>
                    <select name="service" required>
                        <option value="">--Select--</option>
                        <option>Professional Resume & Customized Cover Letter</option>
                        <option>LinkedIn Makeover</option>
                        <option>Interview Preparation</option>
                        <option>Career Counselling & Career Roadmap</option>
                        <option>Skill Gap Analysis</option>
                    </select></div>
                <div class="form-group"><label>Current Employment Status</label>
                    <select name="employment">
                        <option value="">--Select--</option>
                        <option>Student</option>
                        <option>Employed</option>
                        <option>Unemployed</option>
                    </select></div>
                <div class="form-group"><label>Industry/Domain</label><input type="text" name="industry"></div>
                <div class="form-group"><label>Years of Experience</label><input type="text" name="experience"></div>
                <div class="form-group"><label>LinkedIn Profile URL</label><input type="url" name="linkedin"></div>
                <div class="form-group"><label>Upload Resume</label><input type="file" name="resume" style="padding:0.5rem 0;"></div>
                <button type="submit">Submit Query</button>
            </form>
        </div>

        <!-- General Services Form -->
        <div class="form-section" id="general">
            <form id="generalForm" data-form-name="General Services">
                <div class="form-group"><label>Full Name <span class="required-star">*</span></label><input type="text" name="fullName" required></div>
                <div class="form-group"><label>Email Address <span class="required-star">*</span></label><input type="email" name="email" required></div>
                <div class="form-group"><label>Phone Number <span class="required-star">*</span></label><input type="tel" name="phone" required></div>
                <div class="form-group"><label>Category of Interest</label>
                    <select name="category">
                        <option value="">--Select--</option>
                        <option>Study Abroad</option>
                        <option>Academic Writing</option>
                        <option>Careers</option>
                        <option>Other</option>
                    </select></div>
                <div class="form-group"><label>Brief Description of Your Query</label><textarea name="description"></textarea></div>
                <div class="form-group"><label>How did you hear about us?</label><input type="text" name="reference"></div>
                <button type="submit">Submit Query</button>
            </form>
        </div>
    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzAzKrxJefM4jtd_NvQ-rv0ZHesSw0YyOlpZjWJxEgE3Dba3oeIA078vmqDK8B9O9kQdw/exec";

        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                const tabId = btn.getAttribute('data-tab');
                document.querySelectorAll('.form-section').forEach(s => s.classList.remove('active'));
                document.getElementById(tabId).classList.add('active');
                document.getElementById('msgBox').style.display = 'none';
            });
        });

        document.querySelectorAll('form').forEach(form => {
            form.addEventListener('submit', async (e) => {
                e.preventDefault();
                const formName = form.getAttribute('data-form-name');
                const formData = new FormData(form);
                formData.append('formType', formName);
                formData.append('timestamp', new Date().toLocaleString());

                const msgBox = document.getElementById('msgBox');
                msgBox.style.display = 'none';
                msgBox.className = 'message';

                try {
                    const response = await fetch(SCRIPT_URL, {
                        method: 'POST',
                        body: formData
                    });
                    if (response.ok) {
                        msgBox.textContent = "✅ Thank you! Your query has been submitted.";
                        msgBox.classList.add('success');
                        form.reset();
                    } else {
                        throw new Error('Server error');
                    }
                } catch (err) {
                    msgBox.textContent = "❌ Submission failed. Please try again or email us directly.";
                    msgBox.classList.add('error');
                }
                msgBox.style.display = 'block';
                msgBox.scrollIntoView({ behavior: 'smooth' });
            });
        });
    </script>
</body>
</html>
